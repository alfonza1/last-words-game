name: Deploy Production

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  validate:
    name: Validate production candidate
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require a develop commit
        shell: bash
        run: |
          git fetch origin develop:refs/remotes/origin/develop
          git merge-base --is-ancestor "$GITHUB_SHA" origin/develop

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Validate client
        working-directory: client
        run: |
          npm ci
          npm test
          npm run build

      - name: Validate server
        working-directory: server
        run: |
          chmod +x mvnw
          ./mvnw -B test

  deploy:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/heads/release/') && vars.CD_DEPLOYMENTS_ENABLED == 'true'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: ${{ vars.WEB_URL }}
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPOSITORY }}/server:${{ github.sha }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - id: google-auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          token_format: access_token
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Authenticate Docker to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.google-auth.outputs.access_token }}

      - name: Build and publish server image
        uses: docker/build-push-action@v7
        with:
          context: ./server
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha,scope=dead-keys-server
          cache-to: type=gha,mode=max,scope=dead-keys-server

      - id: deploy-api
        name: Deploy production API
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.GCP_CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}
          # NOTE: the --update-secrets entry below is a Secret Manager *reference*
          # (secret name : version), NOT the database password. Cloud Run resolves
          # the real value from Secret Manager at deploy time; the password is never
          # stored in this repo.
          flags: >-
            --allow-unauthenticated
            --cpu=1
            --memory=512Mi
            --min-instances=0
            --max-instances=1
            --concurrency=40
            --update-env-vars=SPRING_DATASOURCE_URL=jdbc:postgresql://ep-ancient-dawn-at2m962z-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require,SPRING_DATASOURCE_USERNAME=neondb_owner
            --update-secrets=SPRING_DATASOURCE_PASSWORD=PROD_SPRING_DATASOURCE_PASSWORD:latest

      - name: Smoke-test production API
        run: curl --fail --retry 8 --retry-delay 5 "${{ steps.deploy-api.outputs.url }}/api/health"

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build production client
        working-directory: client
        env:
          VITE_API_BASE: ${{ vars.API_BASE }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT || 'production' }}
        run: |
          npm ci
          npm run build

      - name: Deploy production client
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy client/dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main
