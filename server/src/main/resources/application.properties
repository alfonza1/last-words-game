server.port=${PORT:4100}
spring.application.name=dead-keys-backend-java

# Serialize/deserialize plain public fields (our mutable Stats/Upgrades/Profile).
spring.jackson.visibility.field=any
spring.jackson.deserialization.fail-on-unknown-properties=false

# Where the JSON save file lives (player progress + leaderboard survive restarts).
deadkeys.dataFile=${DATA_FILE:dk-data.json}
