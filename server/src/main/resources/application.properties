server.port=${PORT:4100}
spring.application.name=dead-keys-backend

# Serialize/deserialize plain public fields (our mutable Stats/Upgrades/Profile).
spring.jackson.visibility.field=any
spring.jackson.deserialization.fail-on-unknown-properties=false

# --- Database ---------------------------------------------------------------
# DEV default: embedded H2 stored on disk (durable, transactional, zero install).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/deadkeys;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# PROD (Postgres): set these env vars and nothing else changes —
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<host>:5432/deadkeys
#   SPRING_DATASOURCE_USERNAME=deadkeys
#   SPRING_DATASOURCE_PASSWORD=<secret>
# The Postgres JDBC driver is already bundled; Hibernate auto-detects the dialect.

# --- Auth -------------------------------------------------------------------
# Firebase project whose ID tokens we accept (public identifier, not a secret).
firebase.projectId=${FIREBASE_PROJECT_ID:dead-keys-bd00f}

# --- One-time coin grant (testing / owner) ---------------------------------
# When set, the named account is granted coins once (e.g. DEADKEYS_GRANT_USER).
deadkeys.grantUser=${DEADKEYS_GRANT_USER:}
deadkeys.grantCoins=${DEADKEYS_GRANT_COINS:30000}

# Coins awarded for an optional rewarded ad after a match.
deadkeys.rewardCoins=${DEADKEYS_REWARD_COINS:50}

# --- Payments (coin packs) — PLACEHOLDER -----------------------------------
# Set the Stripe secret key to enable coin-pack checkout (see docs/DEPLOYMENT.md).
# Leave empty and /api/billing/checkout returns 503 ("not available yet").
stripe.secretKey=${STRIPE_SECRET_KEY:}

# --- Monitoring (Sentry) — PLACEHOLDER -------------------------------------
# Set SENTRY_DSN to ship errors/alerts to Sentry. Empty = disabled (logs only).
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.1

# --- Logging ----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.deadkeys=INFO
logging.level.api.access=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{20}] %msg%n
